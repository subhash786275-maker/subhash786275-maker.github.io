<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sahaj - Government Schemes</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #f4f6f8;
    }

    header {
      background-color: #2c3e50;
      color: white;
      padding: 15px;
      text-align: center;
    }

    .container {
      padding: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .card h3 {
      margin-top: 0;
    }

    .comment-box {
      margin-top: 10px;
    }

    input, textarea {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      margin-top: 10px;
      padding: 8px 12px;
      border: none;
      background-color: #27ae60;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background-color: #219150;
    }

    .comments {
      margin-top: 10px;
      background: #ecf0f1;
      padding: 10px;
      border-radius: 5px;
    }
  </style>
</head>
<body>

<header>
  <h1>Sahaj</h1>
  <p>Simple Platform for Government Schemes</p>
</header>

<div class="container">

  <div class="card">
    <h3>PM Awas Yojana</h3>
    <p><strong>Eligibility:</strong> Low-income families without a house.</p>
    <p><strong>Benefit:</strong> Financial support for housing.</p>

    <div class="comment-box">
      <textarea id="comment1" placeholder="Share your experience..."></textarea>
      <button onclick="addComment('comment1', 'comments1')">Post Comment</button>
    </div>

    <div id="comments1" class="comments"></div>
  </div>

  <div class="card">
    <h3>PM Kisan Yojana</h3>
    <p><strong>Eligibility:</strong> Small and marginal farmers.</p>
    <p><strong>Benefit:</strong> ₹6000 per year.</p>

    <div class="comment-box">
      <textarea id="comment2" placeholder="Share your experience..."></textarea>
      <button onclick="addComment('comment2', 'comments2')">Post Comment</button>
    </div>

    <div id="comments2" class="comments"></div>
  </div>

</div>

<script>
  function addComment(inputId, commentSectionId) {
    const input = document.getElementById(inputId);
    const commentSection = document.getElementById(commentSectionId);

    if (input.value.trim() === '') return;

    const newComment = document.createElement('p');
    newComment.textContent = input.value;

    commentSection.appendChild(newComment);
    input.value = '';
  }
</script>

</body>
</html>
